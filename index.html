<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İyi ki Doğdun En İyi Kalpli Doktor ❤️</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Segoe UI';
text-align:center;
overflow-x:hidden;
}

/* AÇILIŞ */
#intro{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

#intro button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
cursor:pointer;
}

/* YILDIZ */
.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
}
@keyframes twinkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* BAŞLIK */
h1{
margin-top:120px;
font-size:50px;
color:#ff4d88;
}

/* YAZI */
#message{
width:70%;
margin:auto;
font-size:22px;
min-height:60px;
}

/* SAYAC */
#counter{
margin-top:20px;
font-size:22px;
color:#ff7aa8;
}

/* FİLM ŞERİDİ */
.filmContainer{
margin-top:100px;
overflow:hidden;
}

.film{
display:flex;
gap:40px;
animation:move 35s linear infinite;
}

.frame{
background:#111;
border:10px solid #222;
padding:10px;
width:240px;
position:relative;
}

.frame::before,.frame::after{
content:"";
position:absolute;
width:100%;
height:10px;
background:repeating-linear-gradient(to right,black 0,black 10px,transparent 10px,transparent 20px);
}
.frame::before{top:-10px;}
.frame::after{bottom:-10px;}

.frame img{width:100%;}
.caption{margin-top:10px;color:#ccc;}

@keyframes move{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* SCROLL FOTO */
.section{
opacity:0;
transform:translateY(50px);
transition:1s;
margin:80px 0;
}
.section.show{
opacity:1;
transform:translateY(0);
}
.section img{
width:260px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* BUTON */
button.final{
margin:100px 0;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
cursor:pointer;
}

/* FINAL YAZI */
#finalText{
font-size:28px;
margin-top:20px;
}

/* KALP */
.heart{
position:fixed;
font-size:25px;
animation:float 3s linear forwards;
}
@keyframes float{
to{
transform:translateY(-200px);
opacity:0;
}
}
</style>
</head>

<body>

<!-- AÇILIŞ -->
<div id="intro">
<h2>Sana küçük bir sürprizim var 🎁</h2>
<button onclick="start()">Aç ❤️</button>
</div>

<h1> İyi ki Doğdun En İyi Kalpli Doktor ❤️ </h1>

<div id="message"></div>
<div id="counter"></div>

<!-- FİLM -->
<div class="filmContainer">
<div class="film">

<div class="frame"><img src="IMG_1158.jpeg"><div class="caption">14 Haziran 2024</div></div>
<div class="frame"><img src="IMG_1134.jpeg"><div class="caption">26 Haziran 2024</div></div>
<div class="frame"><img src="IMG_1143.jpeg"><div class="caption">2 Nisan 2025</div></div>
<div class="frame"><img src="IMG_1153.jpeg"><div class="caption">23 Ağustos 2025</div></div>
<div class="frame"><img src="IMG_1147.jpeg"><div class="caption">24 Şubat 2026</div></div>

</div>
</div>

<!-- SCROLL FOTO -->
<div class="section"><img src="IMG_1172.jpeg"><p>En Büyük Destekçim ❤️</p></div>
<div class="section"><img src="IMG_1163.jpeg"><p>Bu anı hiç unutmam</p></div>
<div class="section"><img src="7f2ca9ac-1a4f-4867-9c98-3aea94e5
f8e9.jpeg"><p> Güzelliğimm</p></div>
<div class="section"><img src="IMG_1166.jpeg"><p>Elimi koparttiydin</p></div>
<div class="section"><img src="IMG_1168.jpeg"><p>Hehehehe </p></div>
<div class="section"><img src="IMG_1152.jpeg"><p>Bayılırım </p></div>
<div class="section"><img src="IMG_1150.jpeg"><p>Sally Mcqueen</p></div>
<div class="section"><img src="IMG_1148.jpeg"><p>Gozlerine Aşığım </p></div>
<div class="section"><img src="IMG_1144.jpeg"><p>EN SEVDIKLERIM </p></div>
<!-- FINAL -->
<button class="final" onclick="finalAction()">Son bir şey...</button>
<div id="finalText"></div>

<!-- MÜZİK -->
<audio id="music">
<source src="muzik.mp3">
</audio>

<script>

/* BAŞLAT */
function start(){
document.getElementById("intro").style.display="none"
document.getElementById("music").play()
typeText()
}

/* YAZI */
	const text="Hayatımı değiştirdin..."
let i=0
function typeText(){
if(i<text.length){
document.getElementById("message").innerHTML+=text[i]
i++
setTimeout(typeText,40)
}
}

/* SAYAC */
function counter(){
const start=new Date("2024-05-23T17:00:00")
const now=new Date()
const diff=now-start

const d=Math.floor(diff/(1000*60*60*24))
const h=Math.floor((diff/(1000*60*60))%24)

document.getElementById("counter").innerHTML=
"23 Mayıs'tan beri "+d+" gün "+h+" saat birlikteyiz ❤️"
}
setInterval(counter,1000)

/* YILDIZ */
for(let i=0;i<80;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"
document.body.appendChild(s)
}

/* SCROLL */
window.addEventListener("scroll",()=>{
document.querySelectorAll(".section").forEach(sec=>{
if(sec.getBoundingClientRect().top<window.innerHeight-100){
sec.classList.add("show")
}
})
})

/* FINAL */
let step=0
function finalAction(){

if(step==0){
document.getElementById("finalText").innerHTML=
"utanarak sana elimi atmaya calistigim gunlerden 18.’i yasina kadar; harcadigimiz tum dakikalari, eglenerek gecirdigimiz her zamani ve yuzunu guldurebildigim her ani aklima kazimaya calisiyorum. Ben seninle oldugum ilk gunden bu yana hep varligini hissettim ve her zaman en buyuk destekcim oldun, sen farkinda olmasanda basimi yaslayabilecegim bir omuz oldun. Bana temiz kalbinin sevgisini hissettirdin. Tartistigimizda bile kendime “umarim suan yaren dersini aksatmiyordur” cumlesini icimden tekrarliyorum. Umarim bu dunyada hak ettigin herseyi kazanip, cok istedigin doktor olma hayaline kavusursun. Ben her zaman seni destekleyecek ve gurur duyacagim.  
 Gercekden cok incedir, temiz kalbinin icinden gelen bazi narin istekler, durumu kotu olan insanlara yardim etmeyi istemek gibi. Sana soylemiyorum ama emin ol bu hedeflerini gerceklestirmeni ve tum bunlari benim ile birlikte yapmani cok isterim.  Seninle hep gurur duyacagim. Iyi bir sevgili oldugun icin ne kadar tesekkur etsem az. Iyi ki dogdun, iyi ki hayatima dokundun ve canimdan bir parca oldun. 18. Yasin sana saglik ve basari getirsin. Seni herseyden cok seviyorum. Dogum gunun kutlu olsun Yarosum."
step++
}else{

for(let i=0;i<60;i++){
let h=document.createElement("div")
h.className="heart"
h.innerHTML="💖"
h.style.left=Math.random()*100+"%"
h.style.top="60%"
document.body.appendChild(h)

setTimeout(()=>h.remove(),3000)
}
}
}

</script>

</body>
</html>
